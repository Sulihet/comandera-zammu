<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#d3ad55">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Zammu Waifuu">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="css/styles.css">
  <title>Comandera · Zammu Waifuu</title>
</head>
<body>
  <header class="topbar">
    <span class="brand"><img src="perro.png" alt="Zammu Waifuu" class="brand-logo"> Zammu Waifuu</span>
    <button id="btn-settings" class="icon-btn" aria-label="Ajustes">⚙️</button>
  </header>

  <main>
    <!-- ================= PEDIDO ================= -->
    <section id="view-pedido" class="view active">
      <div id="cat-chips" class="chips"></div>
      <div id="item-list" class="item-grid"></div>

      <div class="cart">
        <div id="edit-banner" class="edit-banner" hidden></div>
        <div class="field cart-name-field">
          <label for="customer-name">Nombre del cliente</label>
          <input type="text" id="customer-name" placeholder="ej. Ana" autocomplete="off" maxlength="40">
        </div>
        <div id="service-mode" class="service-mode"></div>
        <div class="cart-head">
          <strong>Pedido actual</strong>
          <span class="cart-total-label">Total <b id="cart-total">$0</b></span>
        </div>
        <div id="cart-lines" class="cart-lines"></div>
        <button id="btn-send" class="btn-primary big" disabled>📲 Enviar a cocina (WhatsApp)</button>
      </div>
    </section>

    <!-- ================= MENÚ ================= -->
    <section id="view-menu" class="view">
      <h1 class="view-title">Editar menú</h1>
      <p class="view-sub">Cambia nombres, precios y disponibilidad. Se guarda solo.</p>
      <div id="menu-editor"></div>
    </section>

    <!-- ================= CIERRE ================= -->
    <section id="view-cierre" class="view">
      <h1 class="view-title">Cierre del día</h1>
      <div id="cierre-head"></div>
      <button id="btn-share-day" class="btn-primary big">📤 Enviar resumen al administrador</button>
      <button id="btn-close-day" class="btn-outline big">🔒 Cerrar día</button>
      <h3 class="section-title">Pedidos de hoy</h3>
      <div id="today-orders"></div>
      <h3 class="section-title">Ventas por concepto</h3>
      <div id="cierre-summary"></div>
    </section>

    <!-- ================= HISTORIAL ================= -->
    <section id="view-historial" class="view">
      <h1 class="view-title">Historial</h1>
      <p class="view-sub">Días cerrados. Toca uno para ver el detalle.</p>
      <div id="historial-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="pedido"><span>🛎️</span>Pedido</button>
    <button class="nav-btn" data-view="menu"><span>📋</span>Menú</button>
    <button class="nav-btn" data-view="cierre"><span>💰</span>Cierre</button>
    <button class="nav-btn" data-view="historial"><span>📚</span>Historial</button>
  </nav>

  <div id="modal-root"></div>
  <div id="toast" class="toast"></div>

  <script src="js/menu-data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
